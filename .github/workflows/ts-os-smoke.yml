name: ts-os docker smoke

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f docker-compose.yml config

      - name: Build backend image
        run: docker build -t ts-os-backend:test ./backend

      - name: Build frontend image
        run: docker build -t ts-os-frontend:test ./frontend

  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dev deps
        working-directory: backend
        run: pip install -e ".[dev,agents]"

      - name: Pytest
        working-directory: backend
        run: pytest -q --tb=short tests/test_distributed_sharding.py tests/test_multi_agent.py tests/test_dashboard_endpoints.py

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: npm ci + build
        working-directory: frontend
        run: |
          npm install
          npm run build

  wasm-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      # curl installer often leaves wasm-pack off PATH in CI; cargo install is reliable.
      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: wasm-pack build
        working-directory: wasm/ts-os-mini
        run: |
          export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
          wasm-pack build --target web --out-dir ../../frontend/public/wasm/ts-os-mini
